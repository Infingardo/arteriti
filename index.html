<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scoring Diagnostico — Arterite a Cellule Giganti (GCA)</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Roboto','Oxygen','Ubuntu','Cantarell','Fira Sans','Droid Sans','Helvetica Neue',sans-serif; -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; }
        .cb-disabled { opacity:0.4; cursor:not-allowed; pointer-events:none; }
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
    const { useState } = React;

    /* ── ICONE ─────────────────────────────────────────────────────────── */
    const AlertCircle = ({className,size=24}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>;
    const CheckCircle = ({className,size=24}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>;
    const Info = ({className,size=24}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>;
    const RotateCcw = ({className,size=24}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>;
    const TriangleAlert = ({className,size=24}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>;
    const Ban = ({className,size=24}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>;

    /* ── COMPONENTE ─────────────────────────────────────────────────────── */
    function GCAScorer() {
        const [sampleAdequacy, setSampleAdequacy] = useState({ length:'', arterialStructure:false, sections:'', elasticStain:false });
        const [majorFindings, setMajorFindings] = useState({ giantCells:false, granulomatous:false, elasticFragmentation:false, transmuralInflammation:false });
        const [minorFindings, setMinorFindings] = useState({ lymphocyticInfiltrate:false, intimalThickening:false, adventitialInflammation:false, neovascularization:false, focalElasticFragmentation:false, eosinophils:false });
        const [clinicalData, setClinicalData] = useState({ age:'', newHeadache:false, jawClaudication:false, visualSymptoms:false, esr:'', crp:false, haloSign:false, onSteroids:false, steroidDays:'' });
        const [ihcMarkers, setIhcMarkers] = useState({ cd68:false, cd4:false, cd8:false, cd3:false, cd20:false });
        const [redFlags, setRedFlags] = useState({ atypicalLymphoid:false, necrotizingGranulomas:false, necrotizingVasculitis:false });
        const [refertoOverride, setRefertoOverride] = useState(null); // null = usa auto-generato; stringa = testo editato manualmente

        // ── MODALITÀ DATI CLINICI ───────────────────────────────────────
        // 'full'    → dati clinici completi      → pesi 60% isto / 40% clinico
        // 'partial' → dati parziali/frammentari  → pesi 80% isto / 20% clinico
        // 'none'    → solo istologia             → peso 100% isto, soglie ricalibrate
        const [clinicalMode, setClinicalMode] = useState('full');

        /* ── GATING: condizioni di eligibilità reperti elastici ─────────── */
        const hasActiveInflammation =
            majorFindings.giantCells ||
            majorFindings.granulomatous ||
            majorFindings.transmuralInflammation ||
            minorFindings.lymphocyticInfiltrate ||
            minorFindings.adventitialInflammation;
        const canUseElastic = sampleAdequacy.elasticStain && hasActiveInflammation;

        /* ── GATING: reperti murali richiedono struttura arteriosa ─────── */
        const hasArterialStructure = sampleAdequacy.arterialStructure;

        /* ── PESI IN BASE ALLA MODALITÀ ──────────────────────────────────── */
        const getWeights = () => {
            if (clinicalMode === 'none')    return { h: 1.00, c: 0.00 };
            if (clinicalMode === 'partial') return { h: 0.80, c: 0.20 };
            return                                 { h: 0.60, c: 0.40 };
        };

        /* ── VALIDAZIONE COERENZA ────────────────────────────────────────── */
        const getValidationWarnings = () => {
            const warnings = [];
            if (!sampleAdequacy.elasticStain && (majorFindings.elasticFragmentation || minorFindings.focalElasticFragmentation)) {
                warnings.push({ level:'error', text:'Frammentazione elastica selezionata senza colorazione elastica (VVG) eseguita. I punti relativi sono ESCLUSI dal calcolo. Eseguire VVG prima di refertare.' });
            }
            if (sampleAdequacy.elasticStain && (majorFindings.elasticFragmentation || minorFindings.focalElasticFragmentation) && !hasActiveInflammation) {
                warnings.push({ level:'error', text:'Frammentazione elastica selezionata in assenza di reperti infiammatori attivi associati. I punti relativi sono ESCLUSI dal calcolo: frammentazione isolata senza infiammazione è aspecifica (aterosclerosi, artefatti, invecchiamento).' });
            }
            if (clinicalData.onSteroids && (clinicalData.steroidDays==='' || isNaN(parseInt(clinicalData.steroidDays)))) {
                warnings.push({ level:'warning', text:'Terapia steroidea indicata ma durata non specificata. Penalità applicata al minimo (−5 pt). Inserire i giorni per valutazione accurata.' });
            }
            if (!hasArterialStructure && (majorFindings.transmuralInflammation || majorFindings.elasticFragmentation || minorFindings.intimalThickening)) {
                warnings.push({ level:'error', text:'Reperti murali selezionati (infiammazione transmurale, frammentazione elastica, ispessimento intimale) su campione con struttura arteriosa assente. Incoerenza logica: i punti relativi sono ESCLUSI dal calcolo.' });
            }
            if (!hasArterialStructure && majorFindings.giantCells) {
                warnings.push({ level:'error', text:'Cellule giganti selezionate ma struttura arteriosa non identificabile: impossibile attribuire topograficamente le CG alla giunzione intima-media. Punti ESCLUSI dal calcolo.' });
            }
            if (minorFindings.eosinophils) {
                warnings.push({ level:'info', text:'Eosinofili intraparietali significativi: reperto atipico per GCA. DD: EGPA, vasculite ANCA-eosinofilica, reazione avventiziale aspecifica. Valutare ANCA (MPO/PR3), eosinofilia periferica, contesto clinico.' });
            }
            return warnings;
        };

        /* ── CALCOLO SCORE ───────────────────────────────────────────────── */
        const calculateScore = () => {
            let histoScore = 0;
            let clinicalScore = 0;

            const length   = parseFloat(sampleAdequacy.length);
            const sections = parseInt(sampleAdequacy.sections);
            const lengthMissing   = isNaN(length)   || sampleAdequacy.length   === '';
            const sectionsMissing = isNaN(sections) || sampleAdequacy.sections === '';

            let adequacyLevel;
            if (!hasArterialStructure) adequacyLevel = 'inadequate';
            else if (lengthMissing || sectionsMissing) adequacyLevel = 'unknown';
            else if (length < 5 || sections < 6) adequacyLevel = 'suboptimal';
            else adequacyLevel = 'adequate';

            if (adequacyLevel === 'inadequate') {
                const age = parseInt(clinicalData.age);
                if (age >= 50) clinicalScore += 15;
                if (age >= 70) clinicalScore += 10;
                if (clinicalData.newHeadache)     clinicalScore += 20;
                if (clinicalData.jawClaudication) clinicalScore += 25;
                if (clinicalData.visualSymptoms)  clinicalScore += 20;
                const esr = parseInt(clinicalData.esr);
                if (esr >= 50) clinicalScore += 10;
                if (esr >= 80) clinicalScore += 10;
                if (clinicalData.crp)      clinicalScore += 10;
                if (clinicalData.haloSign) clinicalScore += 15;
                clinicalScore = Math.min(100, clinicalScore);
                return { histoScore:null, clinicalScore, compositeScore:null, histoContrib:null, clinicContrib:null, steroidPenalty:0, driver:'n/a', adequacyLevel, majorCount:0, minorCount:0, hasCoreCriteria:false, hasRedFlags:redFlags.atypicalLymphoid||redFlags.necrotizingGranulomas||redFlags.necrotizingVasculitis };
            }

            const validMajorFindings = {
                giantCells:            majorFindings.giantCells,
                granulomatous:         majorFindings.granulomatous,
                elasticFragmentation:  majorFindings.elasticFragmentation && canUseElastic,
                transmuralInflammation:majorFindings.transmuralInflammation
            };
            const validMinorFindings = {
                lymphocyticInfiltrate:     minorFindings.lymphocyticInfiltrate,
                intimalThickening:         minorFindings.intimalThickening,
                adventitialInflammation:   minorFindings.adventitialInflammation,
                neovascularization:        minorFindings.neovascularization,
                focalElasticFragmentation: minorFindings.focalElasticFragmentation && canUseElastic
            };
            const majorCount      = Object.values(validMajorFindings).filter(Boolean).length;
            const validMinorCount = Object.values(validMinorFindings).filter(Boolean).length;
            const hasCoreCriteria = validMajorFindings.giantCells || validMajorFindings.granulomatous;

            if (validMajorFindings.giantCells)             histoScore += 22;
            if (validMajorFindings.granulomatous)          histoScore += validMajorFindings.giantCells ? 11 : 22;
            if (validMajorFindings.elasticFragmentation)   histoScore += 15;
            if (validMajorFindings.transmuralInflammation) histoScore += 13;
            if (validMinorFindings.lymphocyticInfiltrate)     histoScore += 5;
            if (validMinorFindings.intimalThickening)         histoScore += 5;
            if (validMinorFindings.adventitialInflammation)   histoScore += 5;
            if (validMinorFindings.neovascularization)        histoScore += 5;
            if (validMinorFindings.focalElasticFragmentation) histoScore += 5;

            // Score clinico — calcolato sempre (anche in modalità 'none'/'partial')
            // In 'none': contribuisce 0% al composito; in 'partial': contribuisce 20%
            const age = parseInt(clinicalData.age);
            if (age >= 50) clinicalScore += 15;
            if (age >= 70) clinicalScore += 10;
            if (clinicalData.newHeadache)     clinicalScore += 20;
            if (clinicalData.jawClaudication) clinicalScore += 25;
            if (clinicalData.visualSymptoms)  clinicalScore += 20;
            const esr = parseInt(clinicalData.esr);
            if (esr >= 50) clinicalScore += 10;
            if (esr >= 80) clinicalScore += 10;
            if (clinicalData.crp)      clinicalScore += 10;
            if (clinicalData.haloSign) clinicalScore += 15;
            clinicalScore = Math.min(100, clinicalScore);

            let steroidPenalty = 0;
            if (clinicalData.onSteroids) {
                const days = parseInt(clinicalData.steroidDays) || 0;
                if (days > 14)     steroidPenalty = 30;
                else if (days >= 7) steroidPenalty = 20;
                else if (days >= 3) steroidPenalty = 10;
                else               steroidPenalty = 5;
            }

            const { h: hw, c: cw } = getWeights();
            const compositeScore = Math.min(100, Math.max(0,
                Math.round((histoScore * hw) + (clinicalScore * cw) - steroidPenalty)
            ));

            const histoContrib  = Math.round(histoScore * hw);
            const clinicContrib = Math.round(clinicalScore * cw);
            const driver = (clinicalMode === 'none')  ? 'morphology' :
                           histoContrib > clinicContrib  ? 'morphology' :
                           clinicContrib > histoContrib  ? 'clinical'   : 'balanced';

            return {
                histoScore, clinicalScore, compositeScore,
                histoContrib, clinicContrib, steroidPenalty, driver, adequacyLevel,
                majorCount, minorCount: validMinorCount, hasCoreCriteria,
                validMajorFindings, validMinorFindings,
                hasRedFlags: redFlags.atypicalLymphoid || redFlags.necrotizingGranulomas || redFlags.necrotizingVasculitis
            };
        };

        /* ── CATEGORIA DIAGNOSTICA ───────────────────────────────────────── */
        const getDiagnosis = (scores, hardInconsistency) => {
            const { compositeScore, majorCount, minorCount, clinicalScore, hasCoreCriteria,
                    adequacyLevel, steroidPenalty, driver } = scores;

            if (adequacyLevel === 'inadequate') return { blocked:'inadequate' };

            if (hardInconsistency) {
                return {
                    blocked:'inconsistent',
                    category:'VALUTAZIONE NON AFFIDABILE',
                    color:'bg-gray-100 border-gray-500',
                    icon:<Ban className="text-gray-600"/>,
                    text:'Incoerenze interne da correggere prima di procedere',
                    recommendation:'Una o più selezioni sono logicamente incompatibili (vedi Avvisi di coerenza). Correggere le incoerenze: il numero composito attuale non è interpretabile.'
                };
            }

            let suboptimalWarning = '';
            if (adequacyLevel === 'unknown') suboptimalWarning = ' | ⚠ Dimensioni campione non inserite.';
            else if (adequacyLevel === 'suboptimal') suboptimalWarning = ' | Campione subottimale: se negativo con sospetto elevato → considerare nuovo prelievo.';

            const driverLabel = driver === 'morphology' ? '— peso prevalente: morfologia'
                              : driver === 'clinical'   ? '— peso prevalente: clinica'
                              : '— morfologia e clinica bilanciate';

            // ── MODALITÀ SOLO ISTOLOGIA: soglie ricalibrate ─────────────────
            // Razionale: senza ancoraggio clinico le soglie sono più stringenti
            // per gli score bassi ma non penalizzano la morfologia positiva forte.
            // Soglie: DIAGNOSTICA ≥55 + ≥2 maggiori + core criteria
            //         ALTAMENTE SUGGESTIVA ≥40 + ≥1 maggiore
            //         COMPATIBILE ≥20 + (≥1 maggiore o ≥2 minori)
            //         BASSA CONCORDANZA ≥10
            //         NEGATIVA <10
            if (clinicalMode === 'none') {
                const modeNote = ' | Diagnosi basata esclusivamente su criteri morfologici — notizie cliniche non disponibili al momento della refertazione.';
                if (compositeScore >= 55 && majorCount >= 2 && hasCoreCriteria) {
                    return {
                        category:'ISTOLOGIA DIAGNOSTICA PER GCA',
                        color:'bg-red-100 border-red-500',
                        icon:<AlertCircle className="text-red-600"/>,
                        text:'Arterite a cellule giganti — diagnosi basata su soli criteri morfologici',
                        driverLabel:'— morfologia (notizie cliniche non disponibili)',
                        recommendation:'Core criteria presenti (CG e/o granulomatosa organizzata) con reperti morfologici complessivi fortemente concordanti. La diagnosi è istologicamente sostenibile in assenza di dati clinici. Comunicare al clinico per integrazione anamnestica e terapeutica.' + suboptimalWarning + modeNote
                    };
                }
                if (compositeScore >= 40 && majorCount >= 1) {
                    return {
                        category:'ISTOLOGIA ALTAMENTE SUGGESTIVA PER GCA',
                        color:'bg-orange-100 border-orange-500',
                        icon:<AlertCircle className="text-orange-600"/>,
                        text:'Reperti morfologici altamente suggestivi — notizie cliniche non disponibili',
                        driverLabel:'— morfologia (notizie cliniche non disponibili)',
                        recommendation: (steroidPenalty > 0
                            ? 'Biopsia sotto steroidi: sensibilità ridotta già dopo 3–5 gg. Reperti istologici altamente suggestivi — interpretare con cautela in assenza di contesto clinico.'
                            : 'Reperti morfologici altamente suggestivi. In assenza di dati clinici non è possibile raggiungere la soglia diagnostica piena. Richiedere urgentemente correlazione clinica (almeno età, VES/PCR, sintomi oculari).') + suboptimalWarning + modeNote
                    };
                }
                if (compositeScore >= 20 && (majorCount >= 1 || minorCount >= 2)) {
                    return {
                        category:'ISTOLOGIA COMPATIBILE CON GCA — NON DIAGNOSTICA',
                        color:'bg-yellow-100 border-yellow-500',
                        icon:<Info className="text-yellow-600"/>,
                        text:'Reperti morfologici compatibili ma non diagnostici. Notizie cliniche non disponibili.',
                        driverLabel:'— morfologia (notizie cliniche non disponibili)',
                        recommendation:'Quadro compatibile ma aspecifico senza ancoraggio clinico. Possibile variante senza cellule giganti (20–30% dei casi). Richiedere dati clinici minimi (età, indici infiammatori, sintomi).' + suboptimalWarning + modeNote
                    };
                }
                if (compositeScore >= 10) {
                    return {
                        category:'BASSA CONCORDANZA MORFOLOGICA CON GCA',
                        color:'bg-blue-100 border-blue-400',
                        icon:<Info className="text-blue-600"/>,
                        text:'Scarsa concordanza morfologica con GCA. Notizie cliniche non disponibili.',
                        driverLabel:'— morfologia (notizie cliniche non disponibili)',
                        recommendation:'Alterazioni aspecifiche o scarsamente rappresentative. DD: vasculite ANCA-associata, arterite di Takayasu, vasculite IgG4-correlata, aterosclerosi accelerata.' + suboptimalWarning + modeNote
                    };
                }
                return {
                    category:'BIOPSIA NEGATIVA / NON CONCLUSIVA',
                    color:'bg-green-100 border-green-500',
                    icon:<CheckCircle className="text-green-600"/>,
                    text:'Non concordante con GCA (soli criteri morfologici)',
                    driverLabel:'— morfologia (notizie cliniche non disponibili)',
                    recommendation: (steroidPenalty > 0
                        ? 'Reperti non diagnostici. Biopsia sotto steroidi — sensibilità ridotta. Se sospetto clinico persiste: eco-Doppler bilaterale, biopsia controlaterale, PET-TC.'
                        : 'Biopsia negativa per GCA. Skip lesions nel ~10–15% dei casi. Se sospetto clinico elevato: eco-Doppler bilaterale, biopsia controlaterale.') + suboptimalWarning + modeNote
                };
            }

            // ── MODALITÀ PARZIALE: soglie standard ma nota esplicita ────────
            const partialNote = clinicalMode === 'partial'
                ? ' | ⚠ Dati clinici incompleti: score conservativo (pesi 80/20). I parametri clinici non inseriti sono conteggiati come assenti — lo score composito sottostima la probabilità reale.'
                : '';

            // ── MODALITÀ COMPLETA + PARZIALE: logica standard ───────────────
            if (compositeScore >= 70 && majorCount >= 2 && hasCoreCriteria) {
                return {
                    category:'ISTOLOGIA DIAGNOSTICA PER GCA',
                    color:'bg-red-100 border-red-500',
                    icon:<AlertCircle className="text-red-600"/>,
                    text:'Arterite a cellule giganti — diagnosi istologica',
                    driverLabel,
                    recommendation:'Reperti morfologici e contesto clinico fortemente concordanti. Core criteria presenti (CG e/o granulomatosa organizzata). Procedere con trattamento secondo linee guida.' + suboptimalWarning + partialNote
                };
            }
            if (compositeScore >= 55 && (majorCount >= 1 || (minorCount >= 3 && clinicalScore >= 50))) {
                const isClinicallyDriven = driver === 'clinical';
                return {
                    category: isClinicallyDriven ? 'ISTOLOGIA COMPATIBILE — CLINICA ALTAMENTE SUGGESTIVA' : 'ALTAMENTE SUGGESTIVO PER GCA',
                    color:'bg-orange-100 border-orange-500',
                    icon:<AlertCircle className="text-orange-600"/>,
                    text: isClinicallyDriven ? 'Biopsia non diagnostica ma clinica fortemente suggestiva' : 'Reperti istologici altamente suggestivi per GCA',
                    driverLabel,
                    recommendation: (steroidPenalty > 0
                        ? 'Biopsia sotto steroidi (sensibilità ridotta già dopo 3–5 gg). Reperti compatibili — interpretare con cautela. Considerare eco-Doppler e/o PET-TC.'
                        : 'Correlazione clinico-laboratoristica raccomandata. Considerare inizio terapia contestualmente all\'iter diagnostico.') + suboptimalWarning + partialNote
                };
            }
            if (compositeScore >= 40 && clinicalScore >= 40) {
                return {
                    category:'ISTOLOGIA NON DIAGNOSTICA — CLINICA SUGGESTIVA',
                    color:'bg-yellow-100 border-yellow-500',
                    icon:<Info className="text-yellow-600"/>,
                    text:'Biopsia compatibile, non diagnostica. Contesto clinico suggestivo.',
                    driverLabel,
                    recommendation:'Reperti compatibili ma non diagnostici. Possibile variante senza cellule giganti (20–30% dei casi). Raccomandati: eco-Doppler temporale/ascellare, eventuale PET-TC, biopsia controlaterale.' + suboptimalWarning + partialNote
                };
            }
            if (compositeScore >= 25) {
                return {
                    category:'BIOPSIA A BASSA CONCORDANZA CON GCA',
                    color:'bg-blue-100 border-blue-400',
                    icon:<Info className="text-blue-600"/>,
                    text:'Scarsa concordanza morfologica e clinica con GCA',
                    driverLabel,
                    recommendation:'Alterazioni aspecifiche o scarsamente rappresentative. DD: vasculite ANCA-associata, arterite di Takayasu, vasculite IgG4-correlata, aterosclerosi accelerata.' + suboptimalWarning + partialNote
                };
            }
            return {
                category:'BIOPSIA NEGATIVA / NON CONCLUSIVA',
                color:'bg-green-100 border-green-500',
                icon:<CheckCircle className="text-green-600"/>,
                text:'Non concordante con GCA',
                driverLabel,
                recommendation: (steroidPenalty > 0
                    ? 'Reperti non diagnostici. Biopsia sotto steroidi — sensibilità ridotta dopo 7–14 gg. Se sospetto clinico persiste: eco-Doppler bilaterale, biopsia controlaterale, PET-TC.'
                    : 'Biopsia negativa per GCA. Skip lesions nel ~10–15% dei casi. Se sospetto clinico elevato: eco-Doppler bilaterale, biopsia controlaterale, imaging grandi vasi.') + suboptimalWarning + partialNote
            };
        };

        /* ── RACCOMANDAZIONI IHC ─────────────────────────────────────────── */
        const getIhcRecommendations = (scores) => {
            const { majorCount, minorCount, compositeScore } = scores;
            const recs = [];
            if (!ihcMarkers.cd68) {
                recs.push(majorCount===0||(majorCount===1&&minorCount<3) ? {
                    marker:'CD68', priority:'ALTA', color:'text-red-600',
                    reason:'Può supportare l\'identificazione dell\'infiltrato macrofagico anche in assenza di CG evidenti. Positivo nel 94% delle GCA morfologicamente confermate (Ciccia et al. 2023). Sensibile ma non specifico — presente anche in altre vasculiti.'
                } : {
                    marker:'CD68', priority:'OPZIONALE', color:'text-blue-600',
                    reason:'Core criteria già presenti. CD68 può documentare la distribuzione intima-media dell\'infiltrato macrofagico.'
                });
            }
            if (!ihcMarkers.cd4 && !ihcMarkers.cd8) {
                if ((compositeScore >= 40 && compositeScore < 70) || clinicalData.onSteroids) {
                    let reason = '';
                    if ((compositeScore>=40&&compositeScore<70)&&clinicalData.onSteroids)
                        reason='Caso borderline + biopsia sotto steroidi: la distribuzione compartimentale CD4/CD8 (pattern descritto: CD4 prevalente in media, CD8 in avventizia) può supportare la DD. Più resistente alla terapia steroidea rispetto alle CG. Non specifico se isolato.';
                    else if (compositeScore>=40&&compositeScore<70)
                        reason='Caso borderline: il rapporto CD4/CD8 e la distribuzione compartimentale possono supportare la DD (pattern descritto in GCA: CD4 in media, CD8 in avventizia). Non specifico se isolato.';
                    else
                        reason='Biopsia sotto steroidi: la caratterizzazione CD4/CD8 può compensare parzialmente la riduzione di sensibilità morfologica. Non specifico se isolato.';
                    recs.push({ marker:'CD4 + CD8', priority:'ALTA', color:'text-red-600', reason });
                } else if (majorCount < 2) {
                    recs.push({ marker:'CD4', priority:'MEDIA', color:'text-orange-600',
                        reason:'Può supportare la diagnosi evidenziando predominanza T helper nella media. Pattern descritto in GCA: CD4+ prevalente a livello intima-media (Weyand & Goronzy, Circ Res 2023). Non specifico se isolato.' });
                }
            } else if (ihcMarkers.cd4 && !ihcMarkers.cd8) {
                recs.push({ marker:'CD8', priority:'MEDIA', color:'text-orange-600',
                    reason:'Per calcolare il rapporto CD4/CD8. In GCA il rapporto è tipicamente >2:1 nella media; CD8+ può prevalere in avventizia. Pattern può supportare la diagnosi, non discriminante isolato.' });
            }
            if (!ihcMarkers.cd20 && majorCount===0 && minorCount<2) {
                recs.push({ marker:'CD20', priority:'MEDIA', color:'text-orange-600',
                    reason:'Può aiutare a escludere vasculiti con componente B prominente (IgG4-correlata, ANCA-associate). In GCA la componente B è tipicamente assente — se abbondante, riconsiderare la diagnosi.' });
            }
            if (!ihcMarkers.cd3 && (ihcMarkers.cd4||ihcMarkers.cd8) && majorCount<2) {
                recs.push({ marker:'CD3', priority:'BASSA', color:'text-gray-600',
                    reason:'Opzionale: quantifica la popolazione T totale. Non essenziale per diagnosi routinaria.' });
            }
            return recs;
        };

        /* ── GENERAZIONE REFERTO ─────────────────────────────────────────── */
        const generateReferto = (sc, diag, mode, smplAdq, majF, minF, clinData, ihcMk, hardIncons) => {
            const vMaj = sc.validMajorFindings || {};
            const vMin = sc.validMinorFindings || {};

            // Campione non refertabile
            if (!smplAdq.arterialStructure) {
                return `ARTERIA TEMPORALE — BIOPSIA\n\nADEGUATEZZA DEL CAMPIONE:\nIl campione non contiene struttura arteriosa identificabile (intima, media e avventizia non riconoscibili). Non refertabile per arterite a cellule giganti.\n\nCONCLUSIONE:\nIl campione non è valutabile istologicamente per assenza di struttura vascolare. La diagnosi di arterite a cellule giganti non può essere applicata. Si raccomanda nuovo prelievo adeguato.`;
            }

            // Adeguatezza
            const len = parseFloat(smplAdq.length);
            const sec = parseInt(smplAdq.sections);
            let adeqText = '';
            if (!isNaN(len) && !isNaN(sec)) adeqText = `Frammento di ${len} mm; ${sec} sezioni analizzate serialmente.`;
            else if (!isNaN(len)) adeqText = `Frammento di ${len} mm; numero di sezioni non specificato.`;
            else if (!isNaN(sec)) adeqText = `${sec} sezioni analizzate; lunghezza frammento non specificata.`;
            else adeqText = `Dimensioni campione non specificate.`;
            adeqText += ` Struttura arteriosa presente (intima-media-avventizia identificabili).`;
            adeqText += ` Colorazione elastica ${smplAdq.elasticStain ? 'eseguita (Verhoeff-Van Gieson o equivalente)' : 'non eseguita'}.`;

            // Reperti istologici
            const findings = [];
            if (vMaj.giantCells)             findings.push('— Cellule giganti multinucleate a livello della giunzione intima-media');
            if (vMaj.granulomatous)           findings.push('— Infiammazione granulomatosa organizzata: aggregati macrofagici centrati sulla lamina elastica interna con distruzione elastica');
            if (vMaj.transmuralInflammation)  findings.push('— Infiammazione transmurale (intima, media e avventizia)');
            if (vMaj.elasticFragmentation)    findings.push('— Frammentazione della lamina elastica interna (>30%) in associazione con infiltrato infiammatorio attivo');
            if (vMin.lymphocyticInfiltrate)   findings.push('— Infiltrato linfocitario nella media e nell\'intima');
            if (vMin.intimalThickening)       findings.push('— Ispessimento intimale concentrico');
            if (vMin.adventitialInflammation) findings.push('— Infiltrato infiammatorio avventiziale/periavventiziale');
            if (vMin.neovascularization)      findings.push('— Neovascolarizzazione della parete vascolare');
            if (vMin.focalElasticFragmentation) findings.push('— Frammentazione focale della lamina elastica interna (<30%) in associazione con infiltrato infiammatorio');
            if (minF.eosinophils)             findings.push('— Eosinofili intraparietali (reperto atipico per GCA; escludere EGPA e vasculiti ANCA-eosinofiliche)');

            // Red flag findings
            const rfFindings = [];
            if (diag.blocked !== 'inadequate') {
                if (redFlags.atypicalLymphoid)     rfFindings.push('— Cellule linfoidi atipiche intravascolari (sospetto linfoma intravascolare — IHC urgente: CD20, CD3, MUM1, Ki67)');
                if (redFlags.necrotizingGranulomas) rfFindings.push('— Granulomi con necrosi centrale (escludere arterite infettiva: ZN, PAS+GMS)');
                if (redFlags.necrotizingVasculitis) rfFindings.push('— Vasculite necrotizzante/necrosi fibrinoide di parete con infiltrato neutrofilico prominente (escludere vasculite ANCA-associata, PAN)');
            }

            // IHC
            const ihcDone = [];
            if (ihcMk.cd68) ihcDone.push('CD68');
            if (ihcMk.cd4)  ihcDone.push('CD4');
            if (ihcMk.cd8)  ihcDone.push('CD8');
            if (ihcMk.cd3)  ihcDone.push('CD3');
            if (ihcMk.cd20) ihcDone.push('CD20');

            // Conclusione — calibrata sulla categoria
            let concl = '';
            if (hardIncons) {
                concl = 'NOTA: Sono presenti incoerenze logiche nei dati inseriti. Il referto automatico non è affidabile nella versione attuale. Correggere le incoerenze prima di procedere alla refertazione definitiva.';
            } else if (rfFindings.length > 0) {
                concl = 'Il quadro morfologico presenta reperti inattesi che orientano verso diagnosi alternative (vedere sezione reperti inattesi). La diagnosi di arterite a cellule giganti, ove applicabile, è da considerarsi diagnosi secondaria subordinata all\'esclusione dei pattern morfologici alternativi identificati.';
            } else {
                const cat = diag.category || '';
                if (cat.includes('DIAGNOSTICA')) {
                    concl = 'Il quadro istologico è diagnostico per arterite a cellule giganti (GCA / arterite temporale di Horton).';
                } else if (cat.includes('ALTAMENTE SUGGESTIV') && !cat.includes('CLINICA')) {
                    concl = 'Il quadro istologico è altamente suggestivo per arterite a cellule giganti. Si raccomanda correlazione con il contesto clinico-laboratoristico per la decisione terapeutica.';
                } else if (cat.includes('CLINICA ALTAMENTE SUGGESTIVA')) {
                    concl = 'Il quadro istologico è compatibile con arterite a cellule giganti, pur in assenza di reperti patognomonici. Il contesto clinico è altamente suggestivo per GCA; si raccomanda avvio dell\'iter terapeutico contestualmente all\'integrazione diagnostica (eco-Doppler, eventuale PET-TC).';
                } else if (cat.includes('NON DIAGNOSTICA') || cat.includes('COMPATIBILE CON GCA')) {
                    concl = 'Il quadro istologico è compatibile con arterite a cellule giganti, in assenza di reperti patognomonici. La diagnosi richiede necessaria integrazione con il contesto clinico-laboratoristico e imaging vascolare (eco-Doppler temporale/ascellare bilaterale, eventuale PET-TC).';
                } else if (cat.includes('BASSA CONCORDANZA')) {
                    concl = 'Il quadro istologico mostra alterazioni infiammatorie vascolari aspecifiche, a bassa concordanza con arterite a cellule giganti. Si raccomanda diagnosi differenziale con vasculite ANCA-associata, arterite di Takayasu e vasculite IgG4-correlata.';
                } else {
                    concl = 'Non si identificano reperti istologici specifici riferibili ad arterite a cellule giganti nelle sezioni esaminate.';
                }
            }

            // Note aggiuntive
            const notes = [];
            if (mode === 'none') {
                notes.push('Referto emesso in assenza di notizie cliniche. La diagnosi si basa esclusivamente sui reperti morfologici. Si raccomanda integrazione con il contesto clinico-anamnestico al momento della valutazione clinica.');
            } else if (mode === 'partial') {
                notes.push('Dati clinici incompleti al momento della refertazione. La valutazione è basata prevalentemente sui reperti morfologici (pesi 80/20). Ogni integrazione anamnestica potrà modificare la categoria diagnostica.');
            }
            if (clinData.onSteroids) {
                const days = parseInt(clinData.steroidDays) || 0;
                notes.push(`Il paziente è in terapia corticosteroidea${days > 0 ? ` da ${days} giorno/i` : ''}. La sensibilità bioptica è ridotta${days >= 7 ? ' in misura significativa' : ' già a partire dai primi giorni di terapia'}; una biopsia negativa o con reperti aspecifici non esclude la diagnosi di GCA in questo contesto clinico.`);
            }

            // Assemblaggio
            let r = `ARTERIA TEMPORALE — BIOPSIA\n\n`;
            r += `ADEGUATEZZA DEL CAMPIONE:\n${adeqText}\n\n`;
            r += `REPERTI ISTOLOGICI:\n`;
            r += findings.length > 0 ? findings.join('\n') : '— Non si identificano reperti infiammatori specifici nelle sezioni esaminate.';
            if (rfFindings.length > 0) {
                r += `\n\nREPERTI INATTESI / RED FLAG:\n${rfFindings.join('\n')}`;
            }
            if (ihcDone.length > 0) {
                r += `\n\nIMMUNOISTOCHIMICA ESEGUITA: ${ihcDone.join(', ')}`;
            }
            r += `\n\nCONCLUSIONE:\n${concl}`;
            if (notes.length > 0) {
                r += `\n\nNOTE:\n${notes.map((n,i) => `${i+1}. ${n}`).join('\n')}`;
            }
            return r;
        };

        /* ── CALCOLI ─────────────────────────────────────────────────────── */
        const validationWarnings = getValidationWarnings();
        const hardInconsistency  = validationWarnings.some(w => w.level === 'error');
        const scores             = calculateScore();
        const diagnosis          = getDiagnosis(scores, hardInconsistency);
        const ihcRecs            = getIhcRecommendations(scores);
        const autoReferto        = generateReferto(scores, diagnosis, clinicalMode, sampleAdequacy, majorFindings, minorFindings, clinicalData, ihcMarkers, hardInconsistency);
        const refertoText        = refertoOverride !== null ? refertoOverride : autoReferto;

        const isBlockedInadequate   = diagnosis.blocked === 'inadequate';
        const isBlockedInconsistent = diagnosis.blocked === 'inconsistent';
        const isBlockedRedFlag      = scores.hasRedFlags && !isBlockedInadequate;
        const showSecondaryGCABlock = isBlockedRedFlag && !isBlockedInconsistent;

        const ab = (() => {
            switch(scores.adequacyLevel){
                case 'adequate':   return {cls:'text-green-600',  label:'ADEGUATO'};
                case 'suboptimal': return {cls:'text-yellow-600', label:'SUBOTTIMALE'};
                case 'inadequate': return {cls:'text-red-600',    label:'NON REFERTABILE'};
                case 'unknown':    return {cls:'text-gray-400',   label:'NON INSERITO'};
                default:           return {cls:'text-gray-400',   label:'—'};
            }
        })();

        // Etichette peso per display
        const { h: hw, c: cw } = getWeights();
        const weightLabel = clinicalMode === 'none'    ? '100% istologia / 0% clinica'
                          : clinicalMode === 'partial' ? '80% istologia / 20% clinica'
                          :                              '60% istologia / 40% clinica';

        const resetAll = () => {
            setSampleAdequacy({length:'',arterialStructure:false,sections:'',elasticStain:false});
            setMajorFindings({giantCells:false,granulomatous:false,elasticFragmentation:false,transmuralInflammation:false});
            setMinorFindings({lymphocyticInfiltrate:false,intimalThickening:false,adventitialInflammation:false,neovascularization:false,focalElasticFragmentation:false,eosinophils:false});
            setClinicalData({age:'',newHeadache:false,jawClaudication:false,visualSymptoms:false,esr:'',crp:false,haloSign:false,onSteroids:false,steroidDays:''});
            setIhcMarkers({cd68:false,cd4:false,cd8:false,cd3:false,cd20:false});
            setRedFlags({atypicalLymphoid:false,necrotizingGranulomas:false,necrotizingVasculitis:false});
            setClinicalMode('full');
            setRefertoOverride(null);
        };

        /* ── RENDER ──────────────────────────────────────────────────────── */
        return (
        <div className="max-w-6xl mx-auto p-6 bg-gradient-to-br from-blue-50 to-indigo-50 min-h-screen">

            {/* HEADER */}
            <div className="bg-white rounded-lg shadow-xl p-6 mb-6">
                <div className="flex justify-between items-center">
                    <div>
                        <h1 className="text-3xl font-bold text-indigo-900 mb-2">Scoring Diagnostico — Arterite a Cellule Giganti (GCA)</h1>
                        <p className="text-gray-600 text-sm">Algoritmo di supporto diagnostico integrato: dati istologici + contesto clinico</p>
                    </div>
                    <button onClick={resetAll} className="flex items-center space-x-2 px-4 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg border border-gray-300" title="Azzera tutti i campi">
                        <RotateCcw size={20}/><span className="font-medium">Reset</span>
                    </button>
                </div>
                <div className="mt-4 p-3 bg-amber-50 border border-amber-300 rounded-md">
                    <p className="text-xs text-amber-800">
                        <strong>Avvertenza metodologica:</strong> Scoring euristico non validato prospetticamente. I livelli di concordanza sono categorie qualitative, non probabilità calibrate. <strong>Non implementa i criteri ACR/EULAR 2023 in senso stretto. La diagnosi rimane esclusiva responsabilità del patologo e del clinico refertante.</strong>
                    </p>
                </div>
            </div>

            {/* ═══ SELETTORE MODALITÀ DATI CLINICI ═══ */}
            <div className="bg-white rounded-lg shadow-md p-5 mb-6 border-2 border-indigo-200">
                <h2 className="text-lg font-bold text-indigo-900 mb-3">Disponibilità dati clinici</h2>
                <p className="text-xs text-gray-500 mb-3">Questa scelta modifica i pesi dello score composito e le soglie diagnostiche.</p>
                <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
                    {/* COMPLETI */}
                    <label className={`flex items-start space-x-3 p-3 rounded-lg border-2 cursor-pointer transition-all ${clinicalMode==='full' ? 'border-indigo-500 bg-indigo-50' : 'border-gray-200 hover:border-indigo-300'}`}>
                        <input type="radio" name="clinicalMode" value="full" checked={clinicalMode==='full'} onChange={()=>setClinicalMode('full')} className="mt-0.5 text-indigo-600"/>
                        <div>
                            <p className="font-semibold text-gray-800 text-sm">Dati clinici completi</p>
                            <p className="text-xs text-gray-500 mt-0.5">Anamnesi e laboratorio disponibili</p>
                            <p className="text-xs font-mono text-indigo-600 mt-1">60% isto · 40% clinica</p>
                        </div>
                    </label>
                    {/* PARZIALI */}
                    <label className={`flex items-start space-x-3 p-3 rounded-lg border-2 cursor-pointer transition-all ${clinicalMode==='partial' ? 'border-orange-500 bg-orange-50' : 'border-gray-200 hover:border-orange-300'}`}>
                        <input type="radio" name="clinicalMode" value="partial" checked={clinicalMode==='partial'} onChange={()=>setClinicalMode('partial')} className="mt-0.5 text-orange-600"/>
                        <div>
                            <p className="font-semibold text-gray-800 text-sm">Dati clinici parziali</p>
                            <p className="text-xs text-gray-500 mt-0.5">Solo alcuni dati disponibili (es. "cecità improvvisa", età)</p>
                            <p className="text-xs font-mono text-orange-600 mt-1">80% isto · 20% clinica</p>
                        </div>
                    </label>
                    {/* SOLO ISTOLOGIA */}
                    <label className={`flex items-start space-x-3 p-3 rounded-lg border-2 cursor-pointer transition-all ${clinicalMode==='none' ? 'border-red-500 bg-red-50' : 'border-gray-200 hover:border-red-300'}`}>
                        <input type="radio" name="clinicalMode" value="none" checked={clinicalMode==='none'} onChange={()=>setClinicalMode('none')} className="mt-0.5 text-red-600"/>
                        <div>
                            <p className="font-semibold text-gray-800 text-sm">Solo istologia</p>
                            <p className="text-xs text-gray-500 mt-0.5">Notizie cliniche non disponibili al referto</p>
                            <p className="text-xs font-mono text-red-600 mt-1">100% isto · soglie ricalibrate</p>
                        </div>
                    </label>
                </div>
                {clinicalMode === 'none' && (
                    <div className="mt-3 p-2 bg-red-50 border border-red-200 rounded text-xs text-red-700">
                        <strong>Modalità istologia pura:</strong> La sezione Dati Clinici rimane compilabile ma non contribuisce allo score composito. Se si dispone anche di un solo dato clinico rilevante (età ≥70, sintomi oculari, claudicatio), considerare la modalità <em>Parziale</em>.
                    </div>
                )}
                {clinicalMode === 'partial' && (
                    <div className="mt-3 p-2 bg-orange-50 border border-orange-200 rounded text-xs text-orange-700">
                        <strong>Modalità parziale:</strong> Inserire solo i dati clinici effettivamente disponibili. I campi vuoti sono conteggiati come assenti — lo score è conservativo per costruzione. Ogni dato aggiunto migliora la stima.
                    </div>
                )}
            </div>

            <div className="grid md:grid-cols-2 gap-6">

            {/* ═══ COLONNA SINISTRA ═══ */}
            <div className="space-y-6">

                {/* 1. ADEGUATEZZA */}
                <div className="bg-white rounded-lg shadow-md p-5">
                    <h2 className="text-xl font-bold text-gray-800 mb-4 border-b pb-2">1. Adeguatezza Campione</h2>
                    <div className="space-y-3">
                        <div>
                            <label className="block text-sm font-medium text-gray-700 mb-1">Lunghezza frammento (mm)</label>
                            <input type="number" step="0.5" value={sampleAdequacy.length}
                                onChange={e=>setSampleAdequacy({...sampleAdequacy,length:e.target.value})}
                                className="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-indigo-500" placeholder="es. 15"/>
                            <p className="text-xs text-gray-500 mt-1">Minimo 5 mm, ottimale ≥10 mm</p>
                        </div>
                        <div>
                            <label className="block text-sm font-medium text-gray-700 mb-1">Numero sezioni analizzate</label>
                            <input type="number" value={sampleAdequacy.sections}
                                onChange={e=>setSampleAdequacy({...sampleAdequacy,sections:e.target.value})}
                                className="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-indigo-500" placeholder="es. 15"/>
                            <p className="text-xs text-gray-500 mt-1">Minimo 6, raccomandato ≥10 sezioni seriali</p>
                        </div>
                        <label className="flex items-center space-x-2 cursor-pointer">
                            <input type="checkbox" checked={sampleAdequacy.arterialStructure}
                                onChange={e=>setSampleAdequacy({...sampleAdequacy,arterialStructure:e.target.checked})}
                                className="w-4 h-4 text-indigo-600 rounded"/>
                            <span className="text-sm text-gray-700">Struttura arteriosa presente (intima-media-avventizia identificabili)</span>
                        </label>
                        <label className="flex items-center space-x-2 cursor-pointer">
                            <input type="checkbox" checked={sampleAdequacy.elasticStain}
                                onChange={e=>setSampleAdequacy({...sampleAdequacy,elasticStain:e.target.checked})}
                                className="w-4 h-4 text-indigo-600 rounded"/>
                            <span className="text-sm text-gray-700">Colorazione elastica eseguita (Verhoeff-Van Gieson o equivalente)</span>
                        </label>
                        {!sampleAdequacy.elasticStain && (
                            <p className="text-xs text-amber-700 bg-amber-50 border border-amber-200 rounded px-2 py-1">
                                ⚠ Colorazione elastica non eseguita. Se selezionati, i reperti di frammentazione elastica genereranno un'incoerenza bloccante ed saranno esclusi dal calcolo.
                            </p>
                        )}
                    </div>
                </div>

                {/* 2. REPERTI MAGGIORI */}
                <div className="bg-white rounded-lg shadow-md p-5">
                    <h2 className="text-xl font-bold text-gray-800 mb-4 border-b pb-2">
                        2. Reperti Istologici Maggiori
                        <span className="text-sm font-normal text-gray-500 ml-2">(pesi gerarchizzati per specificità)</span>
                    </h2>
                    <div className="space-y-3">
                        <label className={`flex items-start space-x-2 cursor-pointer ${!hasArterialStructure?'cb-disabled':''}`}>
                            <input type="checkbox" checked={majorFindings.giantCells}
                                onChange={e=>setMajorFindings({...majorFindings,giantCells:e.target.checked})}
                                disabled={!hasArterialStructure}
                                className="w-4 h-4 mt-0.5 text-red-600 rounded"/>
                            <span className="text-sm text-gray-700">
                                Cellule giganti multinucleate (giunzione intima-media)
                                <span className="text-xs font-semibold text-red-600 ml-1">22 pt</span>
                                {!hasArterialStructure && <span className="text-xs text-red-400 ml-1">[disabilitato: struttura assente]</span>}
                            </span>
                        </label>
                        <label className={`flex items-start space-x-2 cursor-pointer ${!hasArterialStructure?'cb-disabled':''}`}>
                            <input type="checkbox" checked={majorFindings.granulomatous}
                                onChange={e=>setMajorFindings({...majorFindings,granulomatous:e.target.checked})}
                                disabled={!hasArterialStructure}
                                className="w-4 h-4 mt-0.5 text-red-600 rounded"/>
                            <span className="text-sm text-gray-700">
                                Aggregati macrofagici organizzati centrati sulla IEL con distruzione elastica
                                <span className={`text-xs font-semibold ml-1 ${majorFindings.giantCells?'text-amber-600':'text-red-600'}`}>
                                    {majorFindings.giantCells ? '11 pt (ridotto — coesistenza CG)' : '22 pt'}
                                </span>
                                <span className="block text-xs text-gray-400">— non semplice infiltrato macrofagico diffuso</span>
                            </span>
                        </label>
                        <label className={`flex items-start space-x-2 cursor-pointer ${!canUseElastic?'cb-disabled':''}`}>
                            <input type="checkbox" checked={majorFindings.elasticFragmentation}
                                onChange={e=>setMajorFindings({...majorFindings,elasticFragmentation:e.target.checked})}
                                disabled={!canUseElastic}
                                className="w-4 h-4 mt-0.5 text-red-600 rounded"/>
                            <span className="text-sm text-gray-700">
                                Frammentazione elastica diffusa (&gt;30%) con infiammazione attiva associata
                                <span className="text-xs font-semibold text-orange-600 ml-1">15 pt</span>
                                {!sampleAdequacy.elasticStain && <span className="text-xs text-red-400 ml-1">[disabilitato: VVG non eseguita]</span>}
                                {sampleAdequacy.elasticStain && !hasActiveInflammation && <span className="text-xs text-red-400 ml-1">[disabilitato: nessun reperto infiammatorio attivo]</span>}
                                <span className="block text-xs text-gray-400">— richiede VVG eseguita + infiammazione attiva coesistente</span>
                            </span>
                        </label>
                        <label className={`flex items-start space-x-2 cursor-pointer ${!hasArterialStructure?'cb-disabled':''}`}>
                            <input type="checkbox" checked={majorFindings.transmuralInflammation}
                                onChange={e=>setMajorFindings({...majorFindings,transmuralInflammation:e.target.checked})}
                                disabled={!hasArterialStructure}
                                className="w-4 h-4 mt-0.5 text-red-600 rounded"/>
                            <span className="text-sm text-gray-700">
                                Infiammazione transmurale (tutti e tre gli strati)
                                <span className="text-xs font-semibold text-yellow-600 ml-1">13 pt</span>
                                {!hasArterialStructure && <span className="text-xs text-red-400 ml-1">[disabilitato: struttura assente]</span>}
                                <span className="block text-xs text-gray-400">— presente anche in PAN tardiva, vasculiti ANCA, IgG4</span>
                            </span>
                        </label>
                    </div>
                    <div className="mt-3 p-2 bg-red-50 rounded text-xs text-red-700">
                        Per <strong>ISTOLOGIA DIAGNOSTICA</strong>: almeno CG o granulomatosa organizzata. Frammentazione + transmurale isolate → max "ALTAMENTE SUGGESTIVO".
                    </div>
                </div>

                {/* 3. REPERTI MINORI */}
                <div className="bg-white rounded-lg shadow-md p-5">
                    <h2 className="text-xl font-bold text-gray-800 mb-4 border-b pb-2">
                        3. Reperti Istologici Minori
                        <span className="text-sm font-normal text-gray-500 ml-2">(5 pt ciascuno — aumentano sensibilità)</span>
                    </h2>
                    <div className="space-y-2">
                        {[
                            ['lymphocyticInfiltrate', 'Infiltrato linfocitario medio-intimale', false, 'caratterizzazione CD4/CD8 nel blocco IHC'],
                            ['intimalThickening',     'Ispessimento intimale concentrico significativo', !hasArterialStructure, !hasArterialStructure?'disabilitato: struttura assente':null],
                            ['adventitialInflammation','Infiammazione avventiziale/periavventiziale', false, null],
                            ['neovascularization',    'Neovascolarizzazione della parete', false, null],
                        ].map(([key, label, disabled, note]) => (
                            <label key={key} className={`flex items-start space-x-2 cursor-pointer ${disabled?'cb-disabled':''}`}>
                                <input type="checkbox" checked={minorFindings[key]}
                                    onChange={e=>setMinorFindings({...minorFindings,[key]:e.target.checked})}
                                    disabled={disabled}
                                    className="w-4 h-4 mt-0.5 text-orange-600 rounded"/>
                                <span className="text-sm text-gray-700">
                                    {label}
                                    {note && <span className={`text-xs ml-1 ${disabled?'text-red-400':'text-gray-400'}`}>— {note}</span>}
                                </span>
                            </label>
                        ))}
                        <label className={`flex items-start space-x-2 cursor-pointer ${!canUseElastic?'cb-disabled':''}`}>
                            <input type="checkbox" checked={minorFindings.focalElasticFragmentation}
                                onChange={e=>setMinorFindings({...minorFindings,focalElasticFragmentation:e.target.checked})}
                                disabled={!canUseElastic}
                                className="w-4 h-4 mt-0.5 text-orange-600 rounded"/>
                            <span className="text-sm text-gray-700">
                                Frammentazione elastica focale (&lt;30%) con infiammazione associata
                                {!sampleAdequacy.elasticStain && <span className="text-xs text-red-400 ml-1">— disabilitato: VVG non eseguita</span>}
                                {sampleAdequacy.elasticStain && !hasActiveInflammation && <span className="text-xs text-red-400 ml-1">— disabilitato: nessun reperto infiammatorio attivo</span>}
                            </span>
                        </label>
                        <label className="flex items-start space-x-2 cursor-pointer">
                            <input type="checkbox" checked={minorFindings.eosinophils}
                                onChange={e=>setMinorFindings({...minorFindings,eosinophils:e.target.checked})}
                                className="w-4 h-4 mt-0.5 text-amber-500 rounded"/>
                            <span className="text-sm text-gray-700">
                                Eosinofili intraparietali significativi
                                <span className="text-xs font-semibold text-amber-600 ml-1">→ DD alert (non score)</span>
                                <span className="block text-xs text-gray-400">— non modifica il punteggio; genera avviso di diagnosi differenziale</span>
                            </span>
                        </label>
                    </div>
                </div>

                {/* RED FLAGS */}
                <div className="bg-white rounded-lg shadow-md p-5 border-2 border-red-200">
                    <h2 className="text-xl font-bold text-red-800 mb-2 border-b border-red-200 pb-2">⚠ Reperti Inattesi / Red Flag Morfologici</h2>
                    <p className="text-xs text-red-600 mb-3">Se presenti: la categoria diagnostica GCA viene soppressa. Priorità alla caratterizzazione del reperto inatteso.</p>
                    <div className="space-y-3">
                        <label className="flex items-start space-x-2 cursor-pointer">
                            <input type="checkbox" checked={redFlags.atypicalLymphoid}
                                onChange={e=>setRedFlags({...redFlags,atypicalLymphoid:e.target.checked})}
                                className="w-4 h-4 mt-0.5 text-red-600 rounded"/>
                            <span className="text-sm text-gray-700">
                                <strong>Cellule linfoidi atipiche intravascolari</strong>
                                <span className="block text-xs text-gray-500 mt-0.5">Nucleo irregolare/ipercromico nei lumi vascolari o vasa vasorum — anche poche unità sono significative</span>
                            </span>
                        </label>
                        <label className="flex items-start space-x-2 cursor-pointer">
                            <input type="checkbox" checked={redFlags.necrotizingGranulomas}
                                onChange={e=>setRedFlags({...redFlags,necrotizingGranulomas:e.target.checked})}
                                className="w-4 h-4 mt-0.5 text-red-600 rounded"/>
                            <span className="text-sm text-gray-700">
                                <strong>Granulomi con necrosi centrale</strong>
                                <span className="block text-xs text-gray-500 mt-0.5">Necrosi fibrinoide/caseosa al centro dei granulomi — eccezionale in GCA, suggestiva di eziologia infettiva</span>
                            </span>
                        </label>
                        <label className="flex items-start space-x-2 cursor-pointer">
                            <input type="checkbox" checked={redFlags.necrotizingVasculitis}
                                onChange={e=>setRedFlags({...redFlags,necrotizingVasculitis:e.target.checked})}
                                className="w-4 h-4 mt-0.5 text-red-600 rounded"/>
                            <span className="text-sm text-gray-700">
                                <strong>Vasculite necrotizzante / infiltrato neutrofilico prominente con danno di parete</strong>
                                <span className="block text-xs text-gray-500 mt-0.5">Necrosi fibrinoide della parete vascolare o infiltrato polimorfonucleato transmurale con danno strutturale — pattern incompatibile con GCA, orienta verso vasculite ANCA-associata o PAN</span>
                            </span>
                        </label>
                    </div>
                </div>

                {/* 4. DATI CLINICI */}
                <div className={`bg-white rounded-lg shadow-md p-5 ${clinicalMode==='none' ? 'opacity-60' : ''}`}>
                    <h2 className="text-xl font-bold text-gray-800 mb-1 border-b pb-2">
                        4. Dati Clinici
                        {clinicalMode === 'none' && <span className="text-sm font-normal text-red-500 ml-2">(non contribuisce allo score — modalità solo istologia)</span>}
                        {clinicalMode === 'partial' && <span className="text-sm font-normal text-orange-500 ml-2">(inserire solo i dati disponibili)</span>}
                    </h2>
                    {clinicalMode === 'none' && (
                        <p className="text-xs text-gray-500 italic mb-3 mt-1">I dati inseriti qui saranno mostrati nel riepilogo ma non modificano lo score composito in modalità "Solo istologia".</p>
                    )}
                    <div className="space-y-3 mt-3">
                        <div>
                            <label className="block text-sm font-medium text-gray-700 mb-1">Età paziente (anni)</label>
                            <input type="number" value={clinicalData.age} onChange={e=>setClinicalData({...clinicalData,age:e.target.value})}
                                className="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-indigo-500" placeholder="es. 72"/>
                        </div>
                        <div>
                            <label className="block text-sm font-medium text-gray-700 mb-1">VES (mm/h)</label>
                            <input type="number" value={clinicalData.esr} onChange={e=>setClinicalData({...clinicalData,esr:e.target.value})}
                                className="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-indigo-500" placeholder="es. 95"/>
                        </div>
                        {[['newHeadache','Cefalea di nuova insorgenza'],['jawClaudication','Claudicatio mascellare'],
                          ['visualSymptoms','Disturbi visivi (amaurosi fugace, diplopia, perdita visus)'],
                          ['crp','PCR elevata'],['haloSign','Halo sign ecografico positivo (eco-Doppler temporale)']
                        ].map(([key,label])=>(
                            <label key={key} className="flex items-center space-x-2 cursor-pointer">
                                <input type="checkbox" checked={clinicalData[key]} onChange={e=>setClinicalData({...clinicalData,[key]:e.target.checked})}
                                    className="w-4 h-4 text-indigo-600 rounded"/>
                                <span className="text-sm text-gray-700">{label}</span>
                            </label>
                        ))}
                        <label className="flex items-center space-x-2 cursor-pointer">
                            <input type="checkbox" checked={clinicalData.onSteroids} onChange={e=>setClinicalData({...clinicalData,onSteroids:e.target.checked})}
                                className="w-4 h-4 text-indigo-600 rounded"/>
                            <span className="text-sm text-gray-700">Terapia steroidea già iniziata</span>
                        </label>
                        {clinicalData.onSteroids && (
                            <div className="ml-6">
                                <label className="block text-sm font-medium text-gray-700 mb-1">Giorni di terapia steroidea</label>
                                <input type="number" value={clinicalData.steroidDays} onChange={e=>setClinicalData({...clinicalData,steroidDays:e.target.value})}
                                    className="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-indigo-500" placeholder="es. 5"/>
                                <p className="text-xs text-gray-500 mt-1">Sensibilità bioptica ridotta già dopo 3–5 gg; sostanzialmente ridotta dopo 14 gg (Ing et al. 2023)</p>
                            </div>
                        )}
                    </div>
                </div>

                {/* 5. IHC ESEGUITA */}
                <div className="bg-white rounded-lg shadow-md p-5">
                    <h2 className="text-xl font-bold text-gray-800 mb-4 border-b pb-2">5. Marker IHC Eseguiti</h2>
                    <div className="space-y-2">
                        {[['cd68','CD68','macrofagi/cellule giganti'],['cd4','CD4','T helper — prevalente in media in GCA'],
                          ['cd8','CD8','T citotossici — prevalente in avventizia in GCA'],['cd3','CD3','pan-T'],
                          ['cd20','CD20','linfociti B — tipicamente assenti in GCA']].map(([key,name,desc])=>(
                            <label key={key} className="flex items-center space-x-2 cursor-pointer">
                                <input type="checkbox" checked={ihcMarkers[key]} onChange={e=>setIhcMarkers({...ihcMarkers,[key]:e.target.checked})}
                                    className="w-4 h-4 text-purple-600 rounded"/>
                                <span className="text-sm text-gray-700"><strong>{name}</strong> ({desc})</span>
                            </label>
                        ))}
                    </div>
                    <p className="text-xs text-purple-800 mt-3 p-2 bg-purple-50 rounded">
                        Selezionare i marker già eseguiti. L'algoritmo suggerirà eventuali integrazioni.
                    </p>
                </div>
            </div>

            {/* ═══ COLONNA DESTRA (OUTPUT) ═══ */}
            <div className="space-y-6">

                {/* BADGE MODALITÀ ATTIVA */}
                <div className={`rounded-lg p-3 border-2 text-sm font-semibold flex items-center gap-2 ${
                    clinicalMode==='none'    ? 'bg-red-50 border-red-400 text-red-800' :
                    clinicalMode==='partial' ? 'bg-orange-50 border-orange-400 text-orange-800' :
                                              'bg-indigo-50 border-indigo-400 text-indigo-800'
                }`}>
                    <span>{clinicalMode==='none' ? '🔬' : clinicalMode==='partial' ? '⚠' : '✓'}</span>
                    <span>Modalità: <strong>{clinicalMode==='none' ? 'Solo istologia' : clinicalMode==='partial' ? 'Dati clinici parziali' : 'Dati clinici completi'}</strong> — pesi {weightLabel}</span>
                </div>

                {/* AVVISI DI COERENZA */}
                {validationWarnings.length > 0 && (
                    <div className="bg-white rounded-lg shadow-md p-5 border-2 border-amber-400">
                        <h2 className="text-lg font-bold text-amber-800 mb-3 flex items-center gap-2">
                            <TriangleAlert size={20} className="text-amber-600"/>Avvisi di coerenza interna
                        </h2>
                        {hardInconsistency && (
                            <p className="text-xs font-semibold text-red-700 bg-red-50 border border-red-300 rounded px-2 py-1 mb-2">
                                ⛔ Incoerenze bloccanti presenti: la categoria diagnostica è sospesa fino alla correzione.
                            </p>
                        )}
                        <div className="space-y-2">
                            {validationWarnings.map((w,i)=>(
                                <div key={i} className={`text-xs px-3 py-2 rounded border-l-4 ${
                                    w.level==='error'  ?'bg-red-50 border-red-500 text-red-800':
                                    w.level==='warning'?'bg-yellow-50 border-yellow-500 text-yellow-800':
                                    'bg-blue-50 border-blue-400 text-blue-800'
                                }`}>
                                    {w.level==='error'&&<strong>⛔ </strong>}
                                    {w.level==='warning'&&<strong>⚠ </strong>}
                                    {w.level==='info'&&<strong>ℹ DD: </strong>}
                                    {w.text}
                                </div>
                            ))}
                        </div>
                    </div>
                )}

                {/* PUNTEGGI */}
                <div className={`bg-white rounded-lg shadow-md p-5 ${isBlockedInadequate?'opacity-50':''}`}>
                    <h2 className="text-xl font-bold text-gray-800 mb-4 border-b pb-2">
                        Punteggi
                        {isBlockedInadequate && <span className="text-sm font-normal text-red-600 ml-2">(istologia non applicabile)</span>}
                    </h2>
                    <div className="space-y-3">
                        <div className="flex justify-between items-center">
                            <span className="text-gray-700">Score Istologico:</span>
                            <span className={`text-2xl font-bold ${isBlockedInadequate?'text-gray-400':hardInconsistency?'text-gray-500':'text-red-600'}`}>
                                {scores.histoScore===null ? '—' : `${scores.histoScore}/100`}
                            </span>
                        </div>
                        <div className="w-full bg-gray-200 rounded-full h-3">
                            <div className={`h-3 rounded-full transition-all duration-500 ${isBlockedInadequate||scores.histoScore===null?'bg-gray-300':hardInconsistency?'bg-gray-400':'bg-red-500'}`}
                                style={{width:`${scores.histoScore!=null?Math.min(100,scores.histoScore):0}%`}}/>
                        </div>

                        {/* Score clinico — mostrato sempre, ma etichetta varia con la modalità */}
                        <div className="flex justify-between items-center mt-4">
                            <span className="text-gray-700">
                                Score Clinico:
                                {clinicalMode === 'none' && <span className="text-xs text-red-500 ml-1">(non contribuisce)</span>}
                                {clinicalMode === 'partial' && <span className="text-xs text-orange-500 ml-1">(peso 20%)</span>}
                            </span>
                            <span className={`text-2xl font-bold ${clinicalMode==='none'?'text-gray-400':'text-blue-600'}`}>{scores.clinicalScore}/100</span>
                        </div>
                        <div className="w-full bg-gray-200 rounded-full h-3">
                            <div className={`h-3 rounded-full transition-all duration-500 ${clinicalMode==='none'?'bg-gray-300':'bg-blue-500'}`} style={{width:`${Math.min(100,scores.clinicalScore)}%`}}/>
                        </div>
                        {isBlockedInadequate && scores.clinicalScore >= 40 && (
                            <p className="text-xs text-blue-700 bg-blue-50 border border-blue-200 rounded px-2 py-1">
                                Score clinico {scores.clinicalScore}/100 — il contesto clinico è suggestivo nonostante la biopsia non refertabile. Considerare imaging o nuovo prelievo.
                            </p>
                        )}

                        {scores.steroidPenalty > 0 && (
                            <div className="bg-yellow-50 border border-yellow-300 rounded-md p-2 mt-1">
                                <p className="text-xs text-yellow-800">Penalità steroidi: −{scores.steroidPenalty} pt</p>
                            </div>
                        )}

                        {/* Composito */}
                        <div className={`mt-4 pt-4 border-t-2 border-gray-300 ${isBlockedInadequate||hardInconsistency?'opacity-60':''}`}>
                            <div className="flex justify-between items-center">
                                <span className="text-gray-900 font-semibold">Score Composito:</span>
                                <span className={`text-3xl font-bold ${isBlockedInadequate||scores.compositeScore===null?'text-gray-400 line-through':hardInconsistency?'text-gray-500 line-through':'text-indigo-600'}`}>
                                    {scores.compositeScore===null ? '—' : `${scores.compositeScore}/100`}
                                </span>
                            </div>
                            <div className="w-full bg-gray-200 rounded-full h-4 mt-2">
                                <div className={`h-4 rounded-full transition-all duration-500 ${isBlockedInadequate||scores.compositeScore===null||hardInconsistency?'bg-gray-300':'bg-gradient-to-r from-indigo-500 to-purple-600'}`}
                                    style={{width:`${scores.compositeScore!=null?scores.compositeScore:0}%`}}/>
                            </div>
                            {!isBlockedInadequate && !hardInconsistency && scores.compositeScore!=null && (
                                <div className="mt-2 p-2 bg-gray-50 rounded text-xs text-gray-600 border border-gray-200">
                                    <span className="font-semibold">Contributi ({weightLabel}):</span>
                                    {' '}Istologia ({Math.round(hw*100)}%) <span className="text-red-600 font-semibold">+{scores.histoContrib}</span>
                                    {cw > 0 && <>{' '}· Clinica ({Math.round(cw*100)}%) <span className="text-blue-600 font-semibold">+{scores.clinicContrib}</span></>}
                                    {scores.steroidPenalty>0 && <span className="text-yellow-700"> · Steroidi <strong>−{scores.steroidPenalty}</strong></span>}
                                    {' '}— <span className={`font-semibold ${scores.driver==='morphology'?'text-red-600':scores.driver==='clinical'?'text-blue-600':'text-indigo-600'}`}>
                                        {scores.driver==='morphology'?'peso prevalente: morfologia':scores.driver==='clinical'?'peso prevalente: clinica':'morfologia e clinica bilanciate'}
                                    </span>
                                </div>
                            )}
                            {hardInconsistency && <p className="text-xs text-red-600 mt-1">⛔ Score barrato: incoerenze bloccanti attive.</p>}
                            <p className="text-xs text-gray-400 mt-1">{weightLabel} — pesi euristici, non validati prospetticamente</p>
                        </div>
                    </div>
                </div>

                {/* HARD STOP — CAMPIONE NON REFERTABILE */}
                {isBlockedInadequate && (
                    <div className="rounded-lg shadow-lg p-6 border-2 border-red-700 bg-red-50">
                        <div className="flex items-start space-x-3">
                            <TriangleAlert className="text-red-700 flex-shrink-0 mt-1" size={28}/>
                            <div>
                                <h3 className="text-xl font-bold text-red-800 mb-1">NON VALUTABILE ISTOLOGICAMENTE</h3>
                                <p className="text-sm font-semibold text-red-700 mb-2">Struttura arteriosa non identificabile — diagnosi istologica non applicabile</p>
                                <div className="bg-white bg-opacity-60 rounded-md p-3">
                                    <p className="text-sm text-red-800">La classificazione istologica non è possibile in assenza di struttura vascolare. Richiedere nuovo prelievo adeguato.</p>
                                    {scores.clinicalScore >= 40 && (
                                        <p className="text-sm text-blue-800 mt-2 font-medium">Contesto clinico suggestivo (score clinico: {scores.clinicalScore}/100). Considerare eco-Doppler bilaterale, PET-TC o biopsia controlaterale.</p>
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>
                )}

                {/* HARD STOP — RED FLAG */}
                {isBlockedRedFlag && (
                    <div className="rounded-lg shadow-lg p-5 border-2 border-red-600 bg-red-50">
                        <div className="flex items-center space-x-2 mb-3">
                            <TriangleAlert className="text-red-700 flex-shrink-0" size={24}/>
                            <h3 className="text-lg font-bold text-red-800">ALERT — PATTERN ORIENTATO VERSO DIAGNOSI ALTERNATIVA</h3>
                        </div>
                        <p className="text-sm text-red-700 mb-3 font-semibold">Reperti inattesi rilevati. Scoring GCA demoted a secondario — priorità alla caratterizzazione del reperto inatteso.</p>
                        {redFlags.atypicalLymphoid && (
                            <div className="bg-white rounded-md p-3 mb-2 border-l-4 border-red-500">
                                <p className="font-bold text-red-800 text-sm mb-1">⚠ Sospetto Linfoma Intravascolare</p>
                                <p className="text-xs text-gray-700 mb-2">Cellule linfoidi atipiche intravascolari — escludere linfoma intravascolare B o T.</p>
                                <p className="text-xs font-semibold text-gray-800">IHC urgente: <span className="text-red-700">CD20, CD3, MUM1, Ki67</span></p>
                                <p className="text-xs text-gray-600 mt-1">Profilo CD20+/MUM1+ compatibile con IVLBCL a grandi cellule B — da integrare con morfologia complessiva e pannello esteso se necessario.</p>
                            </div>
                        )}
                        {redFlags.necrotizingGranulomas && (
                            <div className="bg-white rounded-md p-3 mb-2 border-l-4 border-orange-500">
                                <p className="font-bold text-orange-800 text-sm mb-1">⚠ Sospetta Arterite Infettiva</p>
                                <p className="text-xs text-gray-700 mb-2">Granulomi con necrosi centrale — eccezionale in GCA. Escludere TBC e micosi invasive.</p>
                                <p className="text-xs font-semibold text-gray-800">Colorazioni speciali: <span className="text-orange-700">ZN (micobatteri), PAS + GMS (funghi)</span></p>
                            </div>
                        )}
                        {redFlags.necrotizingVasculitis && (
                            <div className="bg-white rounded-md p-3 border-l-4 border-purple-500">
                                <p className="font-bold text-purple-800 text-sm mb-1">⚠ Vasculite Necrotizzante / Pattern Neutrofilico</p>
                                <p className="text-xs text-gray-700 mb-2">Necrosi fibrinoide di parete o infiltrato neutrofilico transmurale — pattern incompatibile con GCA classica.</p>
