                                <p className="text-xs font-semibold text-gray-800">DD principale: <span className="text-purple-700">vasculite ANCA-associata (MPA, GPA), PAN</span></p>
                                <p className="text-xs text-gray-600 mt-1">Sierologia: ANCA con differenziazione MPO/PR3.</p>
                            </div>
                        )}
                    </div>
                )}

                {/* CATEGORIA DIAGNOSTICA */}
                {!isBlockedInadequate && !isBlockedRedFlag && (
                    <div className={`rounded-lg shadow-lg p-6 border-2 ${diagnosis.color}`}>
                        <div className="flex items-start space-x-4">
                            <div className="flex-shrink-0 mt-1">{diagnosis.icon}</div>
                            <div className="flex-1">
                                <h3 className="text-xl font-bold mb-1">{diagnosis.category}</h3>
                                {diagnosis.driverLabel && <p className="text-sm font-medium mb-1 text-gray-600 italic">{diagnosis.driverLabel}</p>}
                                <p className="text-base font-semibold mb-1">{diagnosis.text}</p>
                                <div className="bg-white bg-opacity-50 rounded-md p-3 mt-3">
                                    <p className="text-sm font-medium">Raccomandazione:</p>
                                    <p className="text-sm mt-1">{diagnosis.recommendation}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                )}

                {/* GCA SECONDARIO */}
                {showSecondaryGCABlock && (
                    <div className="rounded-lg p-4 border border-gray-300 bg-gray-50 opacity-70">
                        <p className="text-xs font-semibold text-gray-500 mb-2 uppercase tracking-wide">Scoring GCA (secondario — vedere alert sopra)</p>
                        <div className={`rounded-md p-3 border ${diagnosis.color}`}>
                            <p className="text-sm font-bold">{diagnosis.category}</p>
                            {diagnosis.driverLabel && <p className="text-xs text-gray-600 italic">{diagnosis.driverLabel}</p>}
                            <p className="text-sm mt-1">{diagnosis.text}</p>
                        </div>
                    </div>
                )}

                {/* ═══ CAMPO REFERTO ═══ */}
                {!isBlockedInadequate && (
                <div className="bg-white rounded-lg shadow-md p-5 border-2 border-indigo-300">
                    <div className="flex items-center justify-between mb-3 border-b pb-2">
                        <h2 className="text-xl font-bold text-indigo-900">📋 Testo Referto</h2>
                        <div className="flex gap-2">
                            {refertoOverride !== null && (
                                <button
                                    onClick={()=>setRefertoOverride(null)}
                                    className="text-xs px-3 py-1.5 bg-yellow-100 hover:bg-yellow-200 text-yellow-800 rounded border border-yellow-300 font-medium"
                                    title="Ripristina il testo auto-generato">
                                    ↺ Rigenera
                                </button>
                            )}
                            <button
                                onClick={()=>{
                                    navigator.clipboard.writeText(refertoText).catch(()=>{
                                        // fallback
                                        const el = document.createElement('textarea');
                                        el.value = refertoText;
                                        document.body.appendChild(el);
                                        el.select();
                                        document.execCommand('copy');
                                        document.body.removeChild(el);
                                    });
                                }}
                                className="text-xs px-3 py-1.5 bg-indigo-100 hover:bg-indigo-200 text-indigo-800 rounded border border-indigo-300 font-medium"
                                title="Copia negli appunti">
                                📋 Copia
                            </button>
                        </div>
                    </div>
                    {refertoOverride !== null && (
                        <p className="text-xs text-yellow-700 bg-yellow-50 border border-yellow-200 rounded px-2 py-1 mb-2">
                            ✏ Testo modificato manualmente. Clicca "Rigenera" per ripristinare il testo automatico.
                        </p>
                    )}
                    {hardInconsistency && (
                        <p className="text-xs text-red-700 bg-red-50 border border-red-200 rounded px-2 py-1 mb-2">
                            ⛔ Incoerenze bloccanti presenti — il referto generato non è affidabile. Correggere prima di utilizzare.
                        </p>
                    )}
                    <textarea
                        value={refertoText}
                        onChange={e => setRefertoOverride(e.target.value)}
                        rows={18}
                        spellCheck={true}
                        className="w-full text-sm font-mono text-gray-800 border border-gray-300 rounded-md p-3 focus:ring-2 focus:ring-indigo-400 resize-y leading-relaxed bg-gray-50"
                        style={{fontFamily:"'Courier New', Courier, monospace", fontSize:'12.5px'}}
                    />
                    <p className="text-xs text-gray-400 mt-1.5 italic">Testo auto-generato dai reperti selezionati — editabile. Non include valori IHC quantitativi (da aggiungere manualmente).</p>
                </div>
                )}
                <div className="bg-white rounded-lg shadow-md p-5">
                    <h2 className="text-xl font-bold text-gray-800 mb-4 border-b pb-2">Riepilogo Reperti</h2>
                    <div className="space-y-2 text-sm">
                        <div className="flex justify-between">
                            <span className="text-gray-700">Reperti maggiori presenti:</span>
                            <span className="font-bold text-red-600">{scores.majorCount}/4</span>
                        </div>
                        <div className="flex justify-between">
                            <span className="text-gray-700">Reperti minori score-positive:</span>
                            <span className="font-bold text-orange-600">{scores.minorCount}/5</span>
                        </div>
                        <div className="flex justify-between">
                            <span className="text-gray-700">DD alert eosinofili:</span>
                            <span className={`font-bold ${minorFindings.eosinophils?'text-amber-600':'text-gray-400'}`}>
                                {minorFindings.eosinophils ? '⚠ PRESENTE' : 'assente'}
                            </span>
                        </div>
                        <div className="flex justify-between">
                            <span className="text-gray-700">Core criteria (CG o granulomatosa):</span>
                            <span className={`font-bold ${scores.hasCoreCriteria?'text-green-600':'text-gray-400'}`}>
                                {scores.hasCoreCriteria ? 'PRESENTE' : 'ASSENTE'}
                            </span>
                        </div>
                        {majorFindings.giantCells && majorFindings.granulomatous && (
                            <div className="text-xs text-amber-700 bg-amber-50 border border-amber-200 rounded px-2 py-1">
                                Damping applicato: granulomatosa → 11 pt (coesistenza con CG)
                            </div>
                        )}
                        <div className="flex justify-between">
                            <span className="text-gray-700">Adeguatezza campione:</span>
                            <span className={`font-bold ${ab.cls}`}>{ab.label}</span>
                        </div>
                        <div className="flex justify-between pt-1 border-t border-gray-100">
                            <span className="text-gray-700">Modalità calcolo:</span>
                            <span className={`font-bold text-xs ${clinicalMode==='none'?'text-red-600':clinicalMode==='partial'?'text-orange-600':'text-indigo-600'}`}>
                                {clinicalMode==='none' ? 'Solo istologia' : clinicalMode==='partial' ? 'Dati parziali (80/20)' : 'Completo (60/40)'}
                            </span>
                        </div>
                    </div>
                    {scores.adequacyLevel==='suboptimal' && <div className="mt-2 p-2 bg-yellow-50 border border-yellow-300 rounded text-xs text-yellow-800">Campione subottimale: refertabile ma con riserva.</div>}
                    {scores.adequacyLevel==='inadequate' && <div className="mt-2 p-2 bg-red-50 border border-red-400 rounded text-xs text-red-800"><strong>Campione non refertabile:</strong> struttura arteriosa non identificabile.</div>}
                    {scores.adequacyLevel==='unknown' && <div className="mt-2 p-2 bg-gray-50 border border-gray-300 rounded text-xs text-gray-700">Dimensioni campione non inserite.</div>}
                </div>

                {/* RACCOMANDAZIONI IHC */}
                {ihcRecs.length > 0 && (
                    <div className="bg-white rounded-lg shadow-md p-5">
                        <h2 className="text-xl font-bold text-gray-800 mb-4 border-b pb-2">Raccomandazioni IHC</h2>
                        {isBlockedInconsistent && (
                            <p className="text-xs text-gray-500 italic bg-gray-50 border border-gray-300 rounded px-2 py-1 mb-3">
                                ⚠ Indicazioni preliminari — subordinate alla correzione delle incoerenze bloccanti.
                            </p>
                        )}
                        <div className="space-y-3">
                            {ihcRecs.map((rec,i)=>(
                                <div key={i} className="border-l-4 border-purple-400 pl-3 py-2 bg-purple-50 rounded-r">
                                    <div className="flex items-center justify-between mb-1">
                                        <span className="font-bold text-gray-800">{rec.marker}</span>
                                        <span className={`text-xs font-semibold px-2 py-1 rounded ${rec.color} ${rec.priority==='ALTA'?'bg-red-100':rec.priority==='MEDIA'?'bg-orange-100':'bg-gray-100'}`}>{rec.priority}</span>
                                    </div>
                                    <p className="text-sm text-gray-700">{rec.reason}</p>
                                </div>
                            ))}
                        </div>
                    </div>
                )}

                {/* PANNELLI IHC STANDARD */}
                <div className="bg-gradient-to-r from-purple-50 to-indigo-50 rounded-lg p-5">
                    <h3 className="font-bold text-purple-900 mb-3">Pannelli IHC Standard</h3>
                    <div className="space-y-3 text-sm">
                        <div className="bg-white rounded-md p-3 border-l-4 border-green-500">
                            <p className="font-bold text-green-800 mb-1">BASE</p>
                            <ul className="text-gray-700 ml-4 space-y-1 text-xs">
                                <li>H&amp;E + VVG (o equivalente) — obbligatorio</li>
                                <li>Campione ≥10 mm, ottimale 15–20 mm</li>
                                <li><strong>CD68</strong> — quasi indispensabile; sensibile ma non specifico</li>
                            </ul>
                        </div>
                        <div className="bg-white rounded-md p-3 border-l-4 border-orange-500">
                            <p className="font-bold text-orange-800 mb-1">COMPLETO (borderline / biopsia sotto steroidi)</p>
                            <ul className="text-gray-700 ml-4 space-y-1 text-xs">
                                <li><strong>CD68 + CD4 + CD8</strong> — distribuzione compartimentale</li>
                                <li><strong>CD20</strong> — esclude IgG4-correlata, ANCA-associate</li>
                            </ul>
                        </div>
                        <div className="bg-white rounded-md p-3 border-l-4 border-blue-500">
                            <p className="font-bold text-blue-800 mb-1">Performance IHC (letteratura)</p>
                            <ul className="text-gray-700 ml-4 space-y-1 text-xs">
                                <li><strong>CD68:</strong> 94% GCA morfologicamente confermate (Ciccia et al. 2023)</li>
                                <li>Rapporto CD4/CD8: pattern descritto — non criterio diagnostico autonomo (Weyand &amp; Goronzy 2023)</li>
                                <li>CD20 abbondante → riconsiderare diagnosi</li>
                            </ul>
                        </div>
                    </div>
                </div>

                {/* NOTE METODOLOGICHE */}
                <div className="bg-indigo-50 rounded-lg p-5 text-xs">
                    <h3 className="font-bold text-indigo-900 mb-2">Note metodologiche (v3.4.1)</h3>
                    <ul className="space-y-1 text-indigo-800">
                        <li><strong>[v3.4.1]</strong> Campo referto auto-generato: testo editabile con linguaggio calibrato sulla categoria diagnostica. Bottone Copia + Rigenera. Aggiornato in tempo reale con i reperti selezionati.</li>
                        <li><strong>[v3.4]</strong> Modalità disponibilità dati clinici: Full (60/40) / Parziale (80/20) / Solo istologia (100% histo). Soglie diagnostiche ricalibrate per modalità "solo istologia". Score clinico sempre calcolato e visualizzato ma con peso 0 in modalità "none".</li>
                        <li><strong>[v3.4]</strong> In modalità "solo istologia": DIAGNOSTICA ≥55 + ≥2 maggiori + core criteria; ALTAMENTE SUGGESTIVA ≥40 + ≥1 maggiore; COMPATIBILE ≥20 + (≥1 maggiore o ≥2 minori); BASSA CONCORDANZA ≥10; NEGATIVA &lt;10.</li>
                        <li><strong>[v3.4]</strong> Tutte le categorie in modalità "solo istologia" riportano esplicitamente l'assenza di dati clinici nella raccomandazione.</li>
                        <li><strong>[v3.3]</strong> histoScore derivato dai reperti validati (unica fonte di verità); showSecondaryGCABlock soppresso con redFlag + hardInconsistency coesistenti</li>
                        <li><strong>[v3.2]</strong> Classi Tailwind statiche; warning inconsistency esplicito; IHC recs con nota "subordinate alla correzione"</li>
                        <li><strong>[v3.1]</strong> Gating elastica; hard inconsistency; checkbox dinamiche; label granulomatosa dinamica; terza red flag; wording MUM1 cauto</li>
                        <li><strong>Limite epistemologico:</strong> il composito non è una probabilità calibrata. Il giudizio morfologico prevale sull'algoritmo.</li>
                    </ul>
                </div>
            </div>
            </div>

            {/* BIBLIOGRAFIA */}
            <div className="mt-6 bg-white rounded-lg shadow-md p-6">
                <h2 className="text-2xl font-bold text-gray-800 mb-4 border-b-2 border-indigo-200 pb-2">Bibliografia di Riferimento</h2>
                <div className="space-y-4 text-sm">
                    {(() => {
                        const sectionStyles = {
                            indigo: { title:'text-indigo-900', border:'border-indigo-300', link:'text-indigo-600' },
                            red:    { title:'text-red-900',    border:'border-red-300',    link:'text-red-600'    },
                            purple: { title:'text-purple-900', border:'border-purple-300', link:'text-purple-600' },
                            orange: { title:'text-orange-900', border:'border-orange-300', link:'text-orange-600' },
                            green:  { title:'text-green-900',  border:'border-green-300',  link:'text-green-600'  },
                            blue:   { title:'text-blue-900',   border:'border-blue-300',   link:'text-blue-600'   },
                        };
                        const sections = [
                            {title:'Criteri diagnostici e linee guida', color:'indigo', refs:[
                                {auth:'Ponte C, Martínez-Morillo M, Koster MJ, et al.',year:'2024',title:'2023 ACR/EULAR classification criteria for giant cell arteritis',j:'Arthritis Rheumatol.',vol:'76(9):1343-1352',doi:'10.1002/art.42624'},
                                {auth:'Dejaco C, Ramiro S, Duftner C, et al.',year:'2023',title:'EULAR recommendations for imaging in large vessel vasculitis: 2023 update',j:'Ann Rheum Dis.',vol:'82(10):1283-1297',doi:'10.1136/ard-2023-224543'},
                                {auth:'Hellmich B, Agueda A, Monti S, et al.',year:'2020',title:'2018 Update EULAR recommendations large vessel vasculitis',j:'Ann Rheum Dis.',vol:'79(1):19-30',doi:'10.1136/annrheumdis-2019-215672'},
                            ]},
                            {title:'Caratteristiche istopatologiche', color:'red', refs:[
                                {auth:'Watanabe R, Zhang H, Berry GJ, et al.',year:'2024',title:'Immune checkpoint dysfunction in giant cell arteritis',j:'J Exp Med.',vol:'221(5):e20231938',doi:'10.1084/jem.20231938'},
                                {auth:'Ciccia F, Rizzo A, Guggino G, et al.',year:'2023',title:'Histological and immunohistochemical characterization of temporal artery biopsy in GCA: systematic review and meta-analysis',j:'Semin Arthritis Rheum.',vol:'58:152131',doi:'10.1016/j.semarthrit.2022.152131'},
                                {auth:'Stone JH, Tuckwell K, Dimonaco S, et al.',year:'2022',title:'Variability in histopathologic features in GCA and implications for clinical trials',j:'Arthritis Rheumatol.',vol:'74(8):1437-1444',doi:'10.1002/art.42107'},
                            ]},
                            {title:'Immunoistochimica e caratterizzazione immunologica', color:'purple', refs:[
                                {auth:'Weyand CM, Goronzy JJ.',year:'2023',title:'Immunology of giant cell arteritis',j:'Circ Res.',vol:'132(2):238-250',doi:'10.1161/CIRCRESAHA.122.321663'},
                                {auth:'Maleszewski JJ, Younge BR, Fritzlen JT, et al.',year:'2017',title:'Clinical and pathological evolution of GCA: prospective study of follow-up temporal artery biopsies',j:'Mod Pathol.',vol:'30(6):788-796',doi:'10.1038/modpathol.2017.10'},
                                {auth:'van Sleen Y, Wang Q, van der Geest KSM, et al.',year:'2023',title:'Involvement of monocyte subsets in the immunopathology of GCA',j:'Sci Rep.',vol:'13:10388',doi:'10.1038/s41598-023-37376-3'},
                            ]},
                            {title:'Biopsia temporale: tecnica e sensibilità', color:'orange', refs:[
                                {auth:'Ing EB, Sivarajan V, Rotondo RL, et al.',year:'2023',title:'Temporal artery biopsy yield in patients on glucocorticoid therapy for suspected GCA: systematic review and meta-analysis',j:'J Neuroophthalmol.',vol:'43(4):462-471',doi:'10.1097/WNO.0000000000001943'},
                                {auth:'Mahr A, Saba M, Kambouchner M, et al.',year:'2006 [da verificare]',title:'Temporal artery biopsy for diagnosing GCA: the longer, the better?',j:'Ann Rheum Dis.',vol:'65(6):826-828',doi:'10.1136/ard.2005.040899'},
                            ]},
                            {title:'Imaging e correlazione con istologia', color:'green', refs:[
                                {auth:'Sebastian A, Tomelleri A, Kayani A, et al.',year:'2024',title:'Probability of a positive temporal artery biopsy in suspected GCA: prediction score using ultrasound',j:'Ann Rheum Dis.',vol:'83(2):240-247',doi:'10.1136/ard-2023-224909'},
                                {auth:'Monti S, Floris A, Ponte CB, et al.',year:'2023',title:'The proposed role of ultrasound in the management of GCA in routine clinical practice',j:'Rheumatology (Oxford).',vol:'62(5):1688-1699',doi:'10.1093/rheumatology/keac520'},
                                {auth:'Nielsen BD, Gormsen LC, Hansen IT, et al.',year:'2023',title:'Three days of glucocorticoid treatment attenuates large-vessel FDG uptake in GCA',j:'Eur J Nucl Med Mol Imaging.',vol:'50(5):1245-1256',doi:'10.1007/s00259-022-06066-x'},
                            ]},
                            {title:'Trattamento e stratificazione prognostica', color:'blue', refs:[
                                {auth:'Koster MJ, Matteson EL, Warrington KJ.',year:'2024',title:'Recent advances in the management of giant cell arteritis and Takayasu arteritis',j:'Nat Rev Rheumatol.',vol:'20(2):101-115',doi:'10.1038/s41584-023-01058-z'},
                                {auth:'Cavalli G, Tomelleri A, Campochiaro C, et al.',year:'2023',title:'Serum calprotectin and risk of flare in patients with GCA',j:'Rheumatology (Oxford).',vol:'62(11):3617-3623',doi:'10.1093/rheumatology/kead141'},
                            ]},
                        ];
                        return sections.map(section => {
                            const s = sectionStyles[section.color];
                            return (
                                <div key={section.title}>
                                    <h3 className={`font-bold ${s.title} mb-2`}>{section.title}</h3>
                                    <ul className="space-y-2 text-gray-700">
                                        {section.refs.map((r,i)=>(
                                            <li key={i} className={`pl-4 border-l-2 ${s.border}`}>
                                                <strong>{r.auth}</strong> ({r.year}). {r.title}. <em>{r.j}</em> {r.vol}.
                                                {r.doi && <a href={`https://doi.org/${r.doi}`} target="_blank" rel="noopener noreferrer" className={`${s.link} hover:underline text-xs ml-1`}>DOI</a>}
                                            </li>
                                        ))}
                                    </ul>
                                </div>
                            );
                        });
                    })()}
                    <div className="mt-4 pt-3 border-t-2 border-gray-200">
                        <p className="text-xs text-gray-600 italic"><strong>Nota metodologica:</strong> Scoring euristico — non calcolatore ACR/EULAR 2023. Pesi non validati prospetticamente.</p>
                    </div>
                </div>
            </div>

            {/* FOOTER */}
            <div className="mt-6 bg-white rounded-lg shadow-md p-4">
                <div className="flex flex-col md:flex-row items-center justify-between gap-4">
                    <div className="text-xs text-gray-600">
                        <p>Algoritmo euristico ispirato a criteri ACR/EULAR 2023 — pesi non validati prospetticamente</p>
                        <p className="mt-1">Strumento di supporto — non sostituisce il giudizio clinico-patologico</p>
                        <p className="mt-2 text-indigo-600 font-semibold">v3.4.1 — Marzo 2026</p>
                        <div className="mt-2 pt-2 border-t border-gray-200">
                            <a href="https://github.com/Infingardo/arteriti/blob/main/bigino_vasculiti.pdf" target="_blank" rel="noopener noreferrer" className="text-indigo-600 hover:underline">📄 Bigino vasculiti (PDF)</a>
                        </div>
                    </div>
                    <button onClick={resetAll} className="flex items-center space-x-2 px-5 py-2.5 bg-indigo-100 hover:bg-indigo-200 text-indigo-700 rounded-lg border border-indigo-300 font-medium">
                        <RotateCcw size={18}/><span>Nuovo Caso</span>
                    </button>
                </div>
            </div>
        </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<GCAScorer/>);
</script>
</body>
</html>
